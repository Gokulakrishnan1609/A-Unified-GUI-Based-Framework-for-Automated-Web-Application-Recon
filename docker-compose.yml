services:
  web-recon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-recon
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - SMTP_HOST=
      - SMTP_PORT=587
      - SMTP_USERNAME=
      - SMTP_PASSWORD=
      - SMTP_SENDER=
      - SMTP_USE_TLS=true
      - SMTP_USE_SSL=false
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/login.html', timeout=5).read()\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
