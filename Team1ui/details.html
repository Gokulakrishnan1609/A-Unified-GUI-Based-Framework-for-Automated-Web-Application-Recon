<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0284c7" />
  <title>Web-Recon - Scan Details</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- ===== Header ===== -->
  <header class="header">
    <div class="container">
      <div class="header-brand">
        <div class="header-brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        ReconOps
      </div>
      <div class="header-actions">
        <nav class="top-nav">
          <a href="./index.html" class="top-nav-link">Scan Dashboard</a>
          <a href="./history.html" class="top-nav-link active">History & Downloads</a>
        </nav>
        <span class="header-user" id="header-user"></span>
        <button class="btn btn-ghost btn-sm" id="logout-btn" aria-label="Sign out">
          Logout
        </button>
      </div>
    </div>
  </header>

  <!-- ===== Main Content ===== -->
  <div class="container page-wrapper">
    <!-- Back link -->
    <a href="./history.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Back to History
    </a>

    <div class="page-title-group">
      <h2 id="detail-title">Recon Details</h2>
      <p id="detail-subtitle">Loading reconnaissance data...</p>
    </div>

    <!-- Summary Stat Cards -->
    <div class="grid-3" id="stats-grid">
      <!-- Subdomains -->
      <div class="stat-card">
        <div class="stat-icon stat-icon-blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <div>
          <div class="stat-value" id="stat-subdomains">--</div>
          <div class="stat-label">Subdomains</div>
        </div>
      </div>
      <!-- Live Hosts -->
      <div class="stat-card">
        <div class="stat-icon stat-icon-green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <div>
          <div class="stat-value" id="stat-live">--</div>
          <div class="stat-label">Live Hosts</div>
        </div>
      </div>
      <!-- Open Ports -->
      <div class="stat-card">
        <div class="stat-icon stat-icon-amber">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <div>
          <div class="stat-value" id="stat-ports">--</div>
          <div class="stat-label">Open Ports</div>
        </div>
      </div>
    </div>

    <!-- Domain Sections - dynamically populated -->
    <div id="domain-sections" style="margin-top: 32px;"></div>

    <!-- Loading state -->
    <div id="loading-state" class="empty-state" style="padding: 60px 24px;">
      <div class="spinner" style="width: 28px; height: 28px; margin: 0 auto 16px; color: var(--color-primary);"></div>
      <p>Loading reconnaissance data...</p>
    </div>
  </div>

  <script src="./utils.js"></script>
  <script src="./details.js"></script>
</body>
</html>
